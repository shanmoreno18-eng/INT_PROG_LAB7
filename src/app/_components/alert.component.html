<div *ngIf="alerts.length" class="container">
  <div class="m-3">
    <div *ngFor="let alert of alerts" [ngClass]="cssClasses(alert)">
      <span [innerHTML]="alert.message"></span>
      <button
        type="button"
        class="btn-close"
        (click)="removeAlert(alert)">
      </button>
    </div>
  </div>
</div>
